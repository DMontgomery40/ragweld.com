[build]
  command = "npm run build && node scripts/validate-demo.cjs"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[functions."deepseek-mcp"]
  node_bundler = "esbuild"
  external_node_modules = ["@modelcontextprotocol/sdk", "deepseek-mcp-server"]
  included_files = ["node_modules/@modelcontextprotocol/sdk/dist/cjs/server/**"]

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/demo/*"
  to = "/demo/index.html"
  status = 200

[[redirects]]
  from = "https://deepseek-mcp.ragweld.com/mcp"
  to = "/.netlify/functions/deepseek-mcp"
  status = 200
  force = true

[[redirects]]
  from = "/api/deepseek-mcp/mcp"
  to = "/.netlify/functions/deepseek-mcp"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/knobs"
  to = "/glossary"
  status = 301

[[redirects]]
  from = "/knobs/"
  to = "/glossary/"
  status = 301

[[redirects]]
  from = "/blog/posts/cross-encoder-paradigm-shift-qwen3-mlx/"
  to = "/blog/posts/learning-reranker-qwen3-mlx/"
  status = 301

[[redirects]]
  from = "/blog/posts/cross-encoder-paradigm-shift-qwen3-mlx"
  to = "/blog/posts/learning-reranker-qwen3-mlx/"
  status = 301

[[headers]]
  for = "/demo/mockServiceWorker.js"
  [headers.values]
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
