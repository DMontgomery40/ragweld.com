[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/crucible/api/v1/estimate"
  to = "/.netlify/functions/estimate"
  status = 200

[[redirects]]
  from = "/crucible/api/v1/prices"
  to = "/.netlify/functions/prices"
  status = 200

[[redirects]]
  from = "/crucible/api/v1/models"
  to = "/.netlify/functions/models"
  status = 200

[[redirects]]
  from = "/crucible/api/v1/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/crucible/api/v1/resolve-model"
  to = "/.netlify/functions/resolve-model"
  status = 200

[[redirects]]
  from = "/crucible/*"
  to = "/crucible/index.html"
  status = 200
