name: Sync Crucible Public Mirror

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - 'crucible/**'
      - 'scripts/sync-crucible-public.cjs'
      - '.github/workflows/sync-crucible-public.yml'
  workflow_dispatch:

concurrency:
  group: sync-crucible-public
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-crucible-public:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            crucible/package-lock.json

      - name: Verify deploy key secret
        env:
          CRUCIBLE_PUBLIC_DEPLOY_KEY: ${{ secrets.CRUCIBLE_PUBLIC_DEPLOY_KEY }}
        run: |
          if [ -z "$CRUCIBLE_PUBLIC_DEPLOY_KEY" ]; then
            echo "::error::Missing CRUCIBLE_PUBLIC_DEPLOY_KEY secret in DMontgomery40/ragweld.com"
            exit 1
          fi

      - name: Install root deps
        run: npm ci

      - name: Install Crucible deps
        run: npm --prefix crucible ci

      - name: Run Crucible tests
        run: npm --prefix crucible test

      - name: Build Crucible
        run: npm run build:crucible

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CRUCIBLE_PUBLIC_DEPLOY_KEY }}

      - name: Trust GitHub SSH host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Sync Crucible subtree to public repo
        env:
          CRUCIBLE_PUBLIC_REMOTE: git@github.com:DMontgomery40/ragweld-crucible.git
          CRUCIBLE_PUBLIC_BRANCH: main
        run: node scripts/sync-crucible-public.cjs
