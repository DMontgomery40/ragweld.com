name: Refresh Crucible Models

on:
  schedule:
    - cron: '35 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-crucible-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'crucible/package-lock.json'

      - name: Install Crucible deps
        run: npm --prefix crucible ci

      - name: Refresh Crucible model catalog
        run: node crucible/scripts/refresh-models-catalog.mjs --apply

      - name: Validate Crucible build
        run: npm --prefix crucible run build

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add crucible/data/models.json
          if git diff --cached --quiet; then
            echo "No catalog changes to commit."
            exit 0
          fi

          git commit -m "chore(crucible-models): daily refresh"
          git push origin HEAD:${{ github.ref_name }}
